<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс Музыка</title>
    <link rel="stylesheet" href="/static/style.css?v=10">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
                    <polygon points="10,7 17,12 10,17" fill="currentColor"/>
                </svg>
                <span>Яндекс Музыка</span>
            </div>

            <div class="user-info" id="userInfo" style="display:none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <div class="user-name" id="userName"></div>
                    <div class="user-login" id="userLogin"></div>
                </div>
                <button class="btn-icon" onclick="logout()" title="Выйти">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>

            <nav class="nav">
                <button class="nav-item active" data-tab="likes" onclick="switchTab('likes')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                    </svg>
                    Мне нравится
                </button>
                <button class="nav-item" data-tab="playlists" onclick="switchTab('playlists')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                    Плейлисты
                </button>
                <button class="nav-item" data-tab="search" onclick="switchTab('search')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    Поиск
                </button>
                <button class="nav-item" data-tab="downloads" onclick="switchTab('downloads')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Загрузки
                </button>
                <button class="nav-item" data-tab="settings" onclick="switchTab('settings')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                    Настройки
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Login Screen -->
            <div class="tab-content active" id="tab-login">
                <div class="login-container">
                    <div class="login-card">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="login-icon">
                            <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
                            <polygon points="10,7 17,12 10,17" fill="currentColor"/>
                        </svg>
                        <h1>Яндекс Музыка</h1>
                        <p class="login-desc">Авторизация</p>

                        <!-- Auto login button -->
                        <button class="btn-auto-login" onclick="autoLogin()" id="autoLoginBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                            </svg>
                            Войти автоматически
                        </button>
                        <div class="auto-login-hint" id="autoLoginHint">
                            Токен будет получен из cookies браузера
                        </div>

                        <div class="login-divider"><span>или</span></div>

                        <!-- Token input -->
                        <div class="input-group">
                            <input type="password" id="tokenInput" placeholder="OAuth токен" autocomplete="off"
                                   onkeydown="if(event.key==='Enter')login()">
                            <button class="btn-primary" onclick="login()" id="loginBtn">Войти</button>
                        </div>
                        <div class="login-error" id="loginError"></div>
                    </div>
                </div>
            </div>

            <!-- Likes Tab -->
            <div class="tab-content" id="tab-likes">
                <div class="tab-header">
                    <h2>Мне нравится</h2>
                    <div class="tab-actions">
                        <span class="track-count" id="likesCount"></span>
                        <button class="btn-secondary" onclick="downloadSelected('likes')" id="downloadLikesBtn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            Скачать выбранные
                        </button>
                        <button class="btn-secondary" onclick="downloadAll('likes')">
                            Скачать все
                        </button>
                    </div>
                </div>
                <div class="track-list" id="likesList">
                    <div class="loading">Загрузка...</div>
                </div>
                <div class="pagination" id="likesPagination"></div>
            </div>

            <!-- Playlists Tab -->
            <div class="tab-content" id="tab-playlists">
                <div class="tab-header">
                    <h2 id="playlistsTitle">Плейлисты</h2>
                    <button class="btn-secondary" id="backToPlaylists" style="display:none" onclick="showPlaylists()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                        </svg>
                        Назад
                    </button>
                </div>
                <div id="playlistsGrid" class="playlists-grid"></div>
                <div id="playlistTracks" class="track-list" style="display:none"></div>
                <div class="pagination" id="playlistPagination"></div>
            </div>

            <!-- Search Tab -->
            <div class="tab-content" id="tab-search">
                <div class="tab-header">
                    <h2>Поиск</h2>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Трек, артист или альбом..."
                           onkeydown="if(event.key==='Enter')doSearch()">
                    <div class="search-types">
                        <button class="search-type active" data-type="track" onclick="setSearchType('track')">Треки</button>
                        <button class="search-type" data-type="album" onclick="setSearchType('album')">Альбомы</button>
                        <button class="search-type" data-type="artist" onclick="setSearchType('artist')">Артисты</button>
                    </div>
                    <button class="btn-primary" onclick="doSearch()">Найти</button>
                </div>
                <div class="track-list" id="searchResults"></div>
                <div class="pagination" id="searchPagination"></div>
            </div>

            <!-- Downloads Tab -->
            <div class="tab-content" id="tab-downloads">
                <div class="tab-header">
                    <h2>Загрузки</h2>
                    <span class="track-count" id="downloadsCount"></span>
                </div>
                <!-- Batch progress -->
                <div class="batch-progress" id="batchProgress" style="display:none">
                    <div class="progress-info">
                        <span id="batchCurrent">Загрузка...</span>
                        <span id="batchStats"></span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="batchFill"></div>
                    </div>
                </div>
                <div class="track-list" id="downloadsList"></div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-content" id="tab-settings">
                <div class="tab-header">
                    <h2>Настройки</h2>
                </div>
                <div class="settings-section">
                    <h3>Папка загрузок</h3>
                    <div class="settings-path">
                        <div class="path-display" id="currentPath">Загрузка...</div>
                        <button class="btn-secondary" onclick="openFolderPicker()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                            </svg>
                            Выбрать папку
                        </button>
                    </div>
                    <div class="settings-manual">
                        <div class="input-group">
                            <input type="text" id="manualPathInput" placeholder="Или введите путь вручную...">
                            <button class="btn-primary" onclick="setPathManual()">Применить</button>
                        </div>
                    </div>
                </div>

                <!-- Folder picker modal -->
                <div class="folder-picker" id="folderPicker" style="display:none">
                    <div class="picker-header">
                        <button class="btn-icon" onclick="pickerUp()" id="pickerUpBtn" title="Наверх">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                            </svg>
                        </button>
                        <div class="picker-current" id="pickerCurrent">/</div>
                        <button class="btn-secondary" onclick="pickerSelect()" id="pickerSelectBtn">
                            Выбрать эту папку
                        </button>
                        <button class="btn-icon" onclick="closeFolderPicker()" title="Закрыть">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="picker-list" id="pickerList"></div>
                </div>
            </div>

            <!-- Album View -->
            <div class="tab-content" id="tab-album" style="display:none">
                <div class="tab-header">
                    <button class="btn-secondary" onclick="goBackFromAlbum()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                        </svg>
                        Назад
                    </button>
                </div>
                <div class="album-header" id="albumHeader"></div>
                <div class="track-list" id="albumTracks"></div>
            </div>
        </main>
    </div>

    <!-- Toast notifications -->
    <div class="toasts" id="toasts"></div>

    <script src="/static/app.js?v=10"></script>
</body>
</html>
